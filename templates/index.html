<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Org Chart Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        input[type="file"] {
            margin-bottom: 10px;
        }
        input[type="submit"] {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ccc;
            padding: 5px;
            background-color: #fff;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>
    <h1>組織圖產生器</h1>
    
    <form method="POST" enctype="multipart/form-data">
        <label for="file">選擇 CSV 或 TXT 檔案：</label><br>
        <input type="file" name="file" id="file" required><br>
        <input type="submit" value="上傳並生成圖表">
    </form>

    {% if chart_image %}
        <h2>生成的組織圖：</h2>
        <img src="{{ chart_image }}" alt="Org Chart">
    {% endif %}

    <div class="footer">
        &copy; 2026 Org Chart Generator
    </div>
</body>
</html>
