<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>組織圖生成器</title>

<style>

body{
    font-family: "Microsoft JhengHei", sans-serif;
    background:#f4f6f9;
    margin:0;
}

.container{
    width:900px;
    margin:auto;
    margin-top:50px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.upload-box{
    border:2px dashed #ccc;
    padding:40px;
    text-align:center;
    border-radius:8px;
    background:#fafafa;
    transition:0.3s;
}

.upload-box:hover{
    border-color:#4CAF50;
    background:#f0fff3;
}

input[type=file]{
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    background:#4CAF50;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

#result{
    margin-top:30px;
    text-align:center;
}

img{
    max-width:100%;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:20px;
}

.download-btn{
    display:inline-block;
    margin-top:15px;
    background:#2196F3;
}

.download-btn:hover{
    background:#1976D2;
}

.loading{
    font-size:18px;
    color:#555;
}
#viewer {
    width:100%;
    height:650px;
    overflow:hidden;
    border:1px solid #ddd;
    margin-top:20px;
    position:relative;
    background:#fafafa;
}

#viewer img{
    position:absolute;
    transform-origin: top left;
    cursor:grab;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>📊 組織圖生成器</h1>

<form id="upload-form">

<div class="upload-box">
<p>拖曳 Excel 檔案 或 點擊選擇</p>

<input type="file" id="file" name="file" accept=".xlsx" required>

<br>

<button type="submit">生成組織圖</button>

</div>

</form>

<div id="result">
<p>尚未生成組織圖</p>
</div>

</div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
